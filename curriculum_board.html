<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5th Grade · Curriculum Planning Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100vh}
header{background:#1F3864;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:600;letter-spacing:.01em}
header span{font-size:12px;opacity:.65}
.toolbar{background:#fff;border-bottom:1px solid #E5E3DE;padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100}
.toolbar label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-right:2px}
button{font-size:11px;padding:5px 12px;border:1px solid #D5D3CE;background:#fff;border-radius:6px;cursor:pointer;color:#333;transition:all .12s;font-family:inherit}
button:hover{background:#F0EEE9;border-color:#bbb}
button.act{background:#1F3864;color:#fff;border-color:#1F3864}
button.add{background:#2A6B45;color:#fff;border-color:#2A6B45;font-weight:600}
button.add:hover{background:#1d4f31}
button.exp{background:#f8f7f4;border-color:#bbb}
.sep{width:1px;height:24px;background:#E5E3DE;margin:0 4px}
.main{padding:20px 24px;overflow-x:auto}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;cursor:pointer;padding:3px 8px;border-radius:5px;border:1px solid transparent}
.leg:hover{background:#eee;border-color:#ddd}
.leg.act{background:#fff;border-color:#ccc;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.grid-wrap{overflow-x:auto;padding-bottom:8px}
.grid{display:grid;gap:3px;min-width:900px}
.ch{font-size:8.5px;font-weight:600;color:#888;text-align:center;padding:4px 2px;line-height:1.4;user-select:none}
.rl{font-size:8.5px;font-weight:600;color:#666;display:flex;align-items:center;padding-right:6px;line-height:1.3;word-break:break-word}
.cell{min-height:58px;border-radius:7px;border:1.5px dashed #D5D3CE;background:#F0EEE9;display:flex;flex-direction:column;gap:2px;padding:2px;transition:border-color .1s,background .1s}
.cell.dov{border-color:#2E75B6!important;background:#E6F1FB!important;border-style:solid}
.blk{border-radius:5px;padding:5px 7px;cursor:grab;user-select:none;position:relative;border-width:1.5px;border-style:solid;transition:opacity .1s,transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.blk:active{cursor:grabbing;transform:scale(.97)}
.blk.drag{opacity:.3}
.bt{font-size:9.5px;font-weight:600;line-height:1.3;margin-right:12px}
.bs{font-size:8.5px;opacity:.7;margin-top:1px;line-height:1.2}
.rm{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;opacity:0;background:rgba(0,0,0,.2);color:#fff;padding:0;line-height:1;transition:opacity .1s}
.blk:hover .rm{opacity:1}
.pool-section{margin-top:20px;padding-top:16px;border-top:1px solid #E5E3DE}
.pool-label{font-size:12px;font-weight:600;color:#555;margin-bottom:8px}
.pool{display:flex;flex-wrap:wrap;gap:6px;min-height:48px;padding:8px;border-radius:8px;border:1.5px dashed #C5C3BE;background:#F0EEE9}
.pool.dov{border-color:#2E75B6;background:#E6F1FB;border-style:solid}
.mn{padding:5px 10px;border-radius:5px;cursor:grab;font-size:10px;font-weight:600;white-space:nowrap;user-select:none;border-width:1.5px;border-style:solid;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;transition:opacity .1s}
.mn:active{cursor:grabbing;opacity:.8}
.mn.drag{opacity:.3}
.mn .rm{opacity:0}
.mn:hover .rm{opacity:1}
.det{margin-top:16px;padding:14px 18px;border-radius:10px;border:1px solid #E0DED9;background:#fff;font-size:12px;display:none;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.det.op{display:block}
.dtt{font-weight:700;font-size:14px;margin-bottom:10px}
.dr{display:flex;gap:8px;margin-bottom:5px;font-size:11.5px}
.dk{min-width:80px;font-weight:600;color:#444;flex-shrink:0}
.dv{color:#555}
.det-btns{display:flex;gap:6px;margin-top:12px}
.det-btns button{font-size:11px;padding:5px 12px}
.det-btns .danger{border-color:#d44;color:#c33;background:transparent}
.det-btns .danger:hover{background:#fee}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px)}
.modal-bg.op{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:360px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1F3864}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fr input,.fr textarea,.fr select{width:100%;font-size:12px;padding:7px 10px;border:1px solid #D5D3CE;border-radius:7px;background:#FAFAF8;color:#222;font-family:inherit;transition:border-color .12s}
.fr input:focus,.fr textarea:focus{outline:none;border-color:#2E75B6;background:#fff}
.fr textarea{height:56px;resize:vertical}
.cg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px}
.sw{aspect-ratio:1;border-radius:6px;cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative}
.sw:hover{transform:scale(1.08)}
.sw.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(0,0,0,.5)}
.sw.sel{box-shadow:0 0 0 2.5px #1F3864,0 0 0 4px #fff inset}
.dtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.dtag{padding:4px 9px;border-radius:5px;font-size:10.5px;cursor:pointer;border:1.5px solid #D5D3CE;background:#F5F3EF;color:#555;transition:all .1s;font-weight:500}
.dtag.sel{font-weight:700}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #EEE}
.mbtns button{font-size:12px;padding:7px 16px}
.mbtns .pri{background:#2A6B45;color:#fff;border-color:#2A6B45;font-weight:600}
.mbtns .pri:hover{background:#1d4f31}
.term-header{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.term-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.empty-pool{font-size:11px;color:#aaa;font-style:italic;padding:4px}
@media print{.toolbar,.det-btns{display:none}.main{padding:8px}}
</style>
</head>
<body>

<header>
  <h1>5th Grade · Interdisciplinary Arts Planning Board</h1>
  <span>Drag blocks · Click to edit · Create your own</span>
</header>

<div class="toolbar">
  <label>Filter</label>
  <button class="act" data-f="all">All</button>
  <button data-f="VA">Visual Arts</button>
  <button data-f="MU">Music</button>
  <button data-f="DR">Drama</button>
  <button data-f="CDL">CDL</button>
  <button data-f="CL">Classroom</button>
  <div class="sep"></div>
  <button class="add" id="newbtn">+ New block</button>
  <div class="sep"></div>
  <button id="resetbtn">Reset board</button>
  <button class="exp" id="printbtn">🖨 Print</button>
</div>

<div class="main">
  <div class="legend" id="leg"></div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  <div class="pool-section">
    <div class="pool-label">Unplaced units — drag onto the grid above</div>
    <div class="pool" id="pool"></div>
  </div>
  <div class="det" id="det"></div>
</div>

<div class="modal-bg" id="mbg">
  <div class="modal">
    <h3 id="mtitle">New unit block</h3>
    <div class="fr"><label>Title *</label><input id="ft" type="text" placeholder="e.g. Mesopotamia Rap"></div>
    <div class="fr"><label>Subtitle</label><input id="fs" type="text" placeholder="e.g. 3-week flagship unit"></div>
    <div class="fr"><label>Skills</label><input id="fsk" type="text" placeholder="e.g. Audio editing, collaboration"></div>
    <div class="fr"><label>Tools</label><input id="fto" type="text" placeholder="e.g. SoundTrap, Adobe Express"></div>
    <div class="fr"><label>Notes</label><textarea id="fn" placeholder="Block schedule, co-teachers, logistics..."></textarea></div>
    <div class="fr"><label>Disciplines</label><div class="dtags" id="dtags"></div></div>
    <div class="fr"><label>Block color</label><div class="cg" id="cg"></div></div>
    <div class="mbtns">
      <button id="cancelbtn">Cancel</button>
      <button class="pri" id="savebtn">Add block</button>
    </div>
  </div>
</div>

<script>
const TERMS=[
  {label:"Term 1",weeks:["Sep 1","Sep 8","Sep 15","Sep 22","Sep 29","Oct 6","Oct 13","Oct 20","Oct 27","Nov 3","Nov 10","Nov 17"],color:"#1F3864",light:"#E6EFF9"},
  {label:"Term 2",weeks:["Dec 1","Dec 8","Dec 15","Jan 5","Jan 12","Jan 19","Jan 26","Feb 2","Feb 9","Feb 16","Feb 23","Mar 2"],color:"#2A6B45",light:"#E4F2EC"},
  {label:"Term 3",weeks:["Mar 30","Apr 6","Apr 13","Apr 20","Apr 27","May 4","May 11","May 18","May 25","Jun 1"],color:"#7B3500",light:"#F5EBE4"},
];
const TOTAL=TERMS.reduce((a,t)=>a+t.weeks.length,0);

const DC={
  VA:{bg:"#EEEDFE",bd:"#534AB7",tx:"#3C3489",label:"Visual Arts"},
  MU:{bg:"#E1F5EE",bd:"#0F6E56",tx:"#085041",label:"Music"},
  DR:{bg:"#FAECE7",bd:"#993C1D",tx:"#712B13",label:"Drama"},
  CDL:{bg:"#FAEEDA",bd:"#854F0B",tx:"#633806",label:"CDL / Makerspace"},
  CL:{bg:"#F0EEE9",bd:"#5F5E5A",tx:"#333",label:"Classroom"},
};

const PAL=[
  {bg:"#EEEDFE",bd:"#534AB7",tx:"#3C3489",name:"Purple"},
  {bg:"#E1F5EE",bd:"#0F6E56",tx:"#085041",name:"Teal"},
  {bg:"#FAECE7",bd:"#993C1D",tx:"#712B13",name:"Coral"},
  {bg:"#FAEEDA",bd:"#854F0B",tx:"#633806",name:"Amber"},
  {bg:"#F0EEE9",bd:"#5F5E5A",tx:"#333",name:"Gray"},
  {bg:"#E6EFF9",bd:"#1F3864",tx:"#0C2D5E",name:"Navy"},
  {bg:"#E4F2EC",bd:"#2A6B45",tx:"#1a4a2e",name:"Forest"},
  {bg:"#FBEAF0",bd:"#993556",tx:"#72243E",name:"Rose"},
  {bg:"#FEECEC",bd:"#A32D2D",tx:"#791F1F",name:"Red"},
  {bg:"#F2EAFF",bd:"#7030A0",tx:"#4B0082",name:"Violet"},
  {bg:"#E0F7FA",bd:"#0097A7",tx:"#006064",name:"Cyan"},
  {bg:"#FFFDE7",bd:"#C8960C",tx:"#5D4037",name:"Yellow"},
  {bg:"#FCE4F3",bd:"#C2185B",tx:"#880E4F",name:"Pink"},
  {bg:"#E8EAF6",bd:"#3949AB",tx:"#1A237E",name:"Indigo"},
  {bg:"#E8F5E9",bd:"#388E3C",tx:"#1B5E20",name:"Lime"},
  {bg:"#FFF3E0",bd:"#E65100",tx:"#bf360c",name:"Orange"},
  {bg:"#ECEFF1",bd:"#546E7A",tx:"#263238",name:"Steel"},
  {bg:"#F3E5F5",bd:"#7B1FA2",tx:"#4A148C",name:"Mauve"},
];

const ORIG=[
  {id:"u1",title:"Poster Mosaic",sub:"Adobe Express",disc:["VA","CDL"],tools:"Adobe Express",skills:"Visual Design, Composition",notes:"B Block · Emmett",term:0,week:4,pal:0},
  {id:"u2",title:"Recipe Book",sub:"3-week project",disc:["VA","CDL","CL"],tools:"Adobe Express, Google Docs",skills:"Graphic Design, Expository Writing",notes:"B Block",term:0,week:6,pal:5},
  {id:"u3",title:"Wrinkled World",sub:"Laser cut boards",disc:["VA","CDL"],tools:"CDL laser cutter",skills:"Geography, 3D Design",notes:"A Block · Luke/Casey",term:0,week:7,pal:0},
  {id:"u4",title:"Future Self Voicemail",sub:"Audio recording",disc:["MU","DR","CDL"],tools:"SoundTrap",skills:"Audio Editing, Performance",notes:"~1 week",term:0,week:8,pal:1},
  {id:"u5",title:"Great Listen Podcast",sub:"Interview + cover art",disc:["MU","DR","VA","CDL"],tools:"SoundTrap, Adobe Express",skills:"Interviewing, Audio, Visual",notes:"Flagship integration unit",term:1,week:0,pal:2},
  {id:"u6",title:"Mesopotamia Rap",sub:"Flagship unit",disc:["MU","VA","CDL","CL"],tools:"SoundTrap, CDL",skills:"Music Production, SS",notes:"All disciplines · flagship",term:1,week:1,pal:6},
  {id:"u7",title:"Holiday Ornaments",sub:"3D design",disc:["VA","CDL"],tools:"CDL",skills:"Visual Art, 3D Design",notes:"December",term:1,week:2,pal:0},
  {id:"u8",title:"Declamations",sub:"Spoken word performance",disc:["DR","MU","VA"],tools:"CDL recording",skills:"Performance, Voice",notes:"Public performance event",term:1,week:3,pal:2},
  {id:"u9",title:"Visual Art Collab",sub:"Book club tie-in",disc:["VA","CL"],tools:"Various",skills:"Visual Art, Collaboration",notes:"January · Art class",term:1,week:4,pal:0},
  {id:"u10",title:"Ancient Egypt",sub:"Essays + art",disc:["VA","DR","MU","CDL"],tools:"CDL",skills:"SS, Research, Art",notes:"Laser-cut artifacts",term:1,week:7,pal:3},
  {id:"u11",title:"Esperanza Rising",sub:"Reader's theatre",disc:["DR","MU","VA"],tools:"Various",skills:"Performance, Literature",notes:"ERPG unit",term:1,week:7,pal:2},
  {id:"u12",title:"World Peace Project",sub:"Collaborative art",disc:["CL","VA"],tools:"Various",skills:"Global Studies, Art",notes:"Term 3 opener",term:2,week:0,pal:4},
  {id:"u13",title:"India + Mohenjedaro",sub:"Shadow puppets + dig",disc:["VA","DR","MU","CDL"],tools:"CDL, various",skills:"Geography, Ancient India",notes:"Coordinate art + dig roleplay",term:2,week:1,pal:3},
  {id:"u14",title:"World Religion: Hinduism",sub:"Flagship unit",disc:["VA","MU","DR","CDL"],tools:"CDL, SoundTrap",skills:"Mandala, Bhajan, Drama",notes:"Flagship — all disciplines",term:2,week:3,pal:9},
  {id:"u15",title:"World Religion: Buddhism",sub:"Silhouette + prayer card",disc:["VA","MU","DR","CDL"],tools:"CDL, various",skills:"Art, Music, Drama",notes:"Diwali sun catcher",term:2,week:5,pal:1},
  {id:"u16",title:"Board Games",sub:"Design + prototype",disc:["VA","DR","MU","CDL"],tools:"CDL",skills:"Game Design, Narrative",notes:"Showcase event for families",term:2,week:7,pal:6},
  {id:"u17",title:"End of Year Showcase",sub:"Culminating event",disc:["VA","MU","DR","CDL","CL"],tools:"All",skills:"All disciplines",notes:"Family showcase event",term:2,week:8,pal:7},
];

let units=ORIG.map(u=>({...u}));
let nid=200,state={},drag=null,filt="all",editId=null,selPal=0,selDiscs=[];

function initState(){
  state={};
  units.forEach(u=>{
    if(u.term!=null&&u.week!=null){
      const k=`${u.term}-${u.week}`;
      if(!state[k])state[k]=[];
      if(!state[k].includes(u.id))state[k].push(u.id);
    }
  });
}

function p(u){return PAL[u.pal||0];}
function mf(u){return filt==="all"||u.disc.includes(filt);}

function buildLeg(){
  const el=document.getElementById("leg");el.innerHTML="";
  Object.entries(DC).forEach(([k,v])=>{
    const d=document.createElement("div");
    d.className="leg"+(filt===k?" act":"");
    d.innerHTML=`<div class="ldot" style="background:${v.bd}"></div><span>${v.label}</span>`;
    d.onclick=()=>setF(filt===k?"all":k);
    el.appendChild(d);
  });
  const all=document.createElement("div");
  all.className="leg"+(filt==="all"?" act":"");
  all.innerHTML=`<span>All disciplines</span>`;
  all.onclick=()=>setF("all");
  el.insertBefore(all,el.firstChild);
}

function buildGrid(){
  const g=document.getElementById("grid");g.innerHTML="";
  g.style.gridTemplateColumns=`56px repeat(${TOTAL},1fr)`;
  const f=document.createDocumentFragment();
  const c=document.createElement("div");c.className="ch";f.appendChild(c);
  TERMS.forEach(t=>t.weeks.forEach((w,wi)=>{
    const h=document.createElement("div");h.className="ch";
    h.innerHTML=`<span style="color:${t.color};font-size:8px">${t.label.replace("Term ","T")}</span><br>${w}`;
    f.appendChild(h);
  }));
  ["VA","MU","DR","CDL","CL"].forEach((rk,ri)=>{
    const rl=document.createElement("div");rl.className="rl";
    rl.innerHTML=`<span style="color:${DC[rk].bd}">${["Visual Arts","Music","Drama","CDL","Classroom"][ri]}</span>`;
    f.appendChild(rl);
    TERMS.forEach((t,ti)=>t.weeks.forEach((w,wi)=>{
      const cell=document.createElement("div");cell.className="cell";
      cell.style.background=t.light;
      cell.addEventListener("dragover",e=>{e.preventDefault();cell.classList.add("dov");});
      cell.addEventListener("dragleave",()=>cell.classList.remove("dov"));
      cell.addEventListener("drop",e=>oDr(e,ti,wi));
      const k=`${ti}-${wi}`;
      if(state[k])state[k].forEach(uid=>{
        const u=units.find(x=>x.id===uid);
        if(u&&u.disc.includes(rk)&&mf(u))cell.appendChild(mkBlk(u,ti,wi));
      });
      f.appendChild(cell);
    }));
  });
  g.appendChild(f);
}

function mkBlk(u,term,week){
  const c=p(u);
  const b=document.createElement("div");
  b.className="blk";b.draggable=true;b.dataset.uid=u.id;
  b.style.background=c.bg;b.style.borderColor=c.bd;
  b.innerHTML=`<div class="bt" style="color:${c.tx}">${u.title}</div><div class="bs" style="color:${c.tx}">${u.sub}</div><button class="rm" title="Remove from grid">✕</button>`;
  b.querySelector(".rm").onclick=e=>{e.stopPropagation();rmBlk(u.id);};
  b.addEventListener("dragstart",e=>oDS(e,u.id,term,week,false));
  b.addEventListener("dragend",oDE);
  b.addEventListener("click",e=>{if(e.target.classList.contains("rm"))return;showDet(u);});
  return b;
}

function mkMini(u){
  const c=p(u);
  const b=document.createElement("div");
  b.className="mn";b.draggable=true;b.dataset.uid=u.id;
  b.style.background=c.bg;b.style.borderColor=c.bd;b.style.color=c.tx;
  b.innerHTML=`${u.title}<button class="rm" title="Delete block">✕</button>`;
  b.querySelector(".rm").onclick=e=>{e.stopPropagation();if(confirm(`Delete "${u.title}"?`))delU(u.id);};
  b.addEventListener("dragstart",e=>oDS(e,u.id,null,null,true));
  b.addEventListener("dragend",oDE);
  b.addEventListener("click",e=>{if(e.target.classList.contains("rm"))return;showDet(u);});
  return b;
}

function oDS(e,uid,term,week,fp){
  drag={uid,term,week,fp};e.dataTransfer.effectAllowed="move";
  setTimeout(()=>document.querySelectorAll(`[data-uid="${uid}"]`).forEach(el=>el.classList.add("drag")),0);
}
function oDE(){document.querySelectorAll(".drag").forEach(el=>el.classList.remove("drag"));drag=null;}

function oDr(e,term,week){
  e.preventDefault();
  e.currentTarget.classList.remove("dov");
  if(!drag)return;
  const{uid,term:ft,week:fw,fp}=drag;
  const u=units.find(x=>x.id===uid);if(!u)return;
  if(!fp&&ft!=null){const ok=`${ft}-${fw}`;if(state[ok])state[ok]=state[ok].filter(id=>id!==uid);}
  if(term==null){u.term=undefined;u.week=undefined;}
  else{const nk=`${term}-${week}`;if(!state[nk])state[nk]=[];if(!state[nk].includes(uid))state[nk].push(uid);u.term=term;u.week=week;}
  render();
}

function rmBlk(uid){
  const u=units.find(x=>x.id===uid);if(!u)return;
  if(u.term!=null&&u.week!=null){const k=`${u.term}-${u.week}`;if(state[k])state[k]=state[k].filter(id=>id!==uid);}
  u.term=undefined;u.week=undefined;render();
}

function delU(uid){
  const u=units.find(x=>x.id===uid);if(!u)return;
  if(u.term!=null&&u.week!=null){const k=`${u.term}-${u.week}`;if(state[k])state[k]=state[k].filter(id=>id!==uid);}
  units=units.filter(x=>x.id!==uid);
  document.getElementById("det").className="det";render();
}

function showDet(u){
  const c=p(u);const panel=document.getElementById("det");
  panel.className="det op";
  const loc=u.term!=null?`${TERMS[u.term].label} · Week of ${TERMS[u.term].weeks[u.week]}`:"Unplaced";
  panel.innerHTML=`
    <div class="dtt" style="color:${c.tx}">${u.title}</div>
    <div class="dr"><span class="dk">Subtitle</span><span class="dv">${u.sub||"—"}</span></div>
    <div class="dr"><span class="dk">Disciplines</span><span class="dv">${u.disc.map(d=>DC[d]?.label||d).join(", ")}</span></div>
    <div class="dr"><span class="dk">Skills</span><span class="dv">${u.skills||"—"}</span></div>
    <div class="dr"><span class="dk">Tools</span><span class="dv">${u.tools||"—"}</span></div>
    <div class="dr"><span class="dk">Notes</span><span class="dv">${u.notes||"—"}</span></div>
    <div class="dr"><span class="dk">Placed</span><span class="dv">${loc}</span></div>
    <div class="det-btns">
      <button onclick="openMod('${u.id}')">✏️ Edit</button>
      <button class="danger" onclick="if(confirm('Delete this block?'))delU('${u.id}')">Delete</button>
      <button style="margin-left:auto" onclick="document.getElementById('det').className='det'">Close</button>
    </div>`;
}

function setF(f){
  filt=f;
  document.querySelectorAll("[data-f]").forEach(b=>b.classList.toggle("act",b.dataset.f===f));
  render();
}
document.querySelectorAll("[data-f]").forEach(b=>b.addEventListener("click",()=>setF(b.dataset.f)));

function buildPool(){
  const pool=document.getElementById("pool");pool.innerHTML="";
  const placed=new Set(Object.values(state).flat());
  const visible=units.filter(u=>!placed.has(u.id)&&mf(u));
  if(visible.length===0){const e=document.createElement("span");e.className="empty-pool";e.textContent="All visible units are placed on the grid.";pool.appendChild(e);}
  else visible.forEach(u=>pool.appendChild(mkMini(u)));
}

document.getElementById("pool").addEventListener("dragover",e=>e.preventDefault());
document.getElementById("pool").addEventListener("dragover",e=>{e.preventDefault();document.getElementById("pool").classList.add("dov");});
document.getElementById("pool").addEventListener("dragleave",()=>document.getElementById("pool").classList.remove("dov"));
document.getElementById("pool").addEventListener("drop",e=>oDr(e,null,null));

function openMod(uid){
  editId=uid||null;
  const u=uid?units.find(x=>x.id===uid):null;
  document.getElementById("mtitle").textContent=u?"Edit block":"New unit block";
  document.getElementById("ft").value=u?u.title:"";
  document.getElementById("fs").value=u?u.sub:"";
  document.getElementById("fsk").value=u?u.skills:"";
  document.getElementById("fto").value=u?u.tools:"";
  document.getElementById("fn").value=u?u.notes:"";
  document.getElementById("savebtn").textContent=u?"Save changes":"Add block";
  selPal=u?(u.pal||0):0;
  selDiscs=u?[...u.disc]:[];

  const dt=document.getElementById("dtags");dt.innerHTML="";
  Object.entries(DC).forEach(([k,v])=>{
    const tag=document.createElement("div");
    const sel=selDiscs.includes(k);
    tag.className="dtag"+(sel?" sel":"");
    tag.textContent=v.label;
    if(sel){tag.style.background=v.bg;tag.style.borderColor=v.bd;tag.style.color=v.tx;}
    tag.onclick=()=>{selDiscs=selDiscs.includes(k)?selDiscs.filter(d=>d!==k):[...selDiscs,k];openMod(editId);};
    dt.appendChild(tag);
  });

  const cg=document.getElementById("cg");cg.innerHTML="";
  PAL.forEach((c,i)=>{
    const sw=document.createElement("div");
    sw.className="sw"+(i===selPal?" sel":"");
    sw.style.background=c.bg;
    sw.style.border=`2px solid ${c.bd}`;
    sw.title=c.name;
    sw.onclick=()=>{selPal=i;openMod(editId);};
    cg.appendChild(sw);
  });

  document.getElementById("mbg").className="modal-bg op";
  setTimeout(()=>document.getElementById("ft").focus(),100);
}

function closeMod(){document.getElementById("mbg").className="modal-bg";editId=null;}
document.getElementById("mbg").addEventListener("click",e=>{if(e.target===e.currentTarget)closeMod();});
document.getElementById("cancelbtn").addEventListener("click",closeMod);
document.getElementById("newbtn").addEventListener("click",()=>openMod());
document.getElementById("savebtn").addEventListener("click",()=>{
  const title=document.getElementById("ft").value.trim();
  if(!title){document.getElementById("ft").focus();return;}
  const data={title,sub:document.getElementById("fs").value.trim(),skills:document.getElementById("fsk").value.trim(),tools:document.getElementById("fto").value.trim(),notes:document.getElementById("fn").value.trim(),disc:selDiscs.length?selDiscs:["CL"],pal:selPal};
  if(editId){const u=units.find(x=>x.id===editId);if(u)Object.assign(u,data);}
  else units.push({id:"u"+(++nid),...data,term:undefined,week:undefined});
  closeMod();render();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMod();});

document.getElementById("resetbtn").addEventListener("click",()=>{
  if(!confirm("Reset the board to its original state?"))return;
  units=ORIG.map(u=>({...u}));nid=200;
  document.getElementById("det").className="det";
  initState();render();
});
document.getElementById("printbtn").addEventListener("click",()=>window.print());

function render(){initState();buildLeg();buildGrid();buildPool();}
render();
</script>
</body>
</html>
